<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MeetPlace</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<main class="shell">
    <section class="workspace">
        <div class="intro">
            <p class="eyebrow">MeetPlace</p>
            <h1>각자 출발지를 넣고 가장 괜찮은 약속 지역을 고르세요</h1>
            <p class="lead">
                평균 거리, 거리 편차, 중심점과의 거리를 함께 계산해 후보 지역을 추천합니다.
                모임 목적과 추천 기준을 바꾸면 결과가 달라집니다.
            </p>
        </div>

        <form class="panel" th:action="@{/recommend}" th:object="${request}" method="post">
            <div class="controls">
                <label>
                    <span>모임 목적</span>
                    <select th:field="*{purpose}">
                        <option th:each="purpose : ${purposes}"
                                th:value="${purpose}"
                                th:text="${purpose.label}">
                        </option>
                    </select>
                </label>
                <label>
                    <span>추천 기준</span>
                    <select th:field="*{mode}">
                        <option th:each="mode : ${modes}"
                                th:value="${mode}"
                                th:text="${mode.label}">
                        </option>
                    </select>
                </label>
            </div>

            <div class="participants">
                <div class="participant-card" th:each="participant, stat : *{participants}">
                    <label>
                        <span>이름</span>
                        <input type="text" th:field="*{participants[__${stat.index}__].name}">
                    </label>
                    <label>
                        <span>위도</span>
                        <input type="number" step="0.0001" th:field="*{participants[__${stat.index}__].latitude}">
                    </label>
                    <label>
                        <span>경도</span>
                        <input type="number" step="0.0001" th:field="*{participants[__${stat.index}__].longitude}">
                    </label>
                </div>
            </div>

            <button type="submit">후보 지역 추천</button>
        </form>
    </section>

    <section class="result-band" th:if="${result != null}">
        <div class="result-head">
            <div>
                <p class="eyebrow">Recommendation</p>
                <h2>추천 후보 5곳</h2>
            </div>
            <p th:text="'중심 좌표 ' + ${#numbers.formatDecimal(result.centerLatitude, 1, 4)} + ', ' + ${#numbers.formatDecimal(result.centerLongitude, 1, 4)}"></p>
        </div>

        <div class="recommendations">
            <article class="recommendation-card" th:each="place, stat : ${result.recommendations}">
                <div class="rank" th:text="${stat.index + 1}"></div>
                <div class="card-main">
                    <div class="title-line">
                        <div>
                            <h3 th:text="${place.areaName}">홍대입구</h3>
                            <p th:text="${place.description}">지역 설명</p>
                        </div>
                        <strong th:text="${place.score} + '점'">92점</strong>
                    </div>

                    <p class="reason" th:text="${place.reason}">추천 이유</p>

                    <div class="metrics">
                        <span th:text="'평균 ' + ${place.averageDistanceKm} + 'km'"></span>
                        <span th:text="'최대 ' + ${place.maxDistanceKm} + 'km'"></span>
                        <span th:text="'편차 ' + ${place.fairnessGapKm} + 'km'"></span>
                        <span th:text="'중심점 ' + ${place.centerDistanceKm} + 'km'"></span>
                        <span th:text="'예상 ' + ${place.estimatedTravelMinutes} + '분'"></span>
                        <span th:text="${place.fairnessLevel}"></span>
                    </div>

                    <div class="chips">
                        <span th:each="type : ${place.recommendedPlaceTypes}" th:text="${type}"></span>
                    </div>

                    <div class="distances">
                        <div th:each="distance : ${place.participantDistances}">
                            <span th:text="${distance.name}">나</span>
                            <b th:text="${distance.distanceKm} + 'km'">3.2km</b>
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </section>
</main>
</body>
</html>
